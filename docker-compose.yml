services:
  web:
    build:
      context: ./docker/php
    container_name: museo_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    restart: unless-stopped
    mem_limit: 256m

  db:
    build:
      context: ./docker/mariadb
    container_name: museo_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: museo
      MARIADB_USER: museo_user
      MARIADB_PASSWORD: museo_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    mem_limit: 256m

  adminer:
    image: adminer:latest
    container_name: museo_adminer
    depends_on:
      - db
    ports:
      - "8081:8080"
    restart: unless-stopped
    mem_limit: 64m

volumes:
  db_data:
