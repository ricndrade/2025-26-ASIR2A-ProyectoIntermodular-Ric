services:
  web:
    build:
      context: ./docker/php
    container_name: museo_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: museo_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: museo
      MYSQL_USER: museo_user
      MYSQL_PASSWORD: museo_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: museo_phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  db_data: